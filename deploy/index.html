<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>public-apps</title>
    <style>
      body { font-family: "Hiragino Sans", system-ui, sans-serif; background: #faf7f2; color: #2c2622; max-width: 640px; margin: 0 auto; padding: 48px 20px; line-height: 1.7; }
      h1 { font-size: 1.6rem; }
      a.app { display: block; border: 1px solid #ece4da; border-radius: 12px; padding: 16px 18px; margin: 14px 0; text-decoration: none; color: inherit; background: #fff; }
      a.app:hover { background: #fdf4ec; }
      .name { font-weight: 700; font-size: 1.1rem; }
      .desc { color: #8a807a; font-size: 0.92rem; }
      footer { color: #8a807a; font-size: 0.85rem; margin-top: 32px; }
    </style>
  </head>
  <body>
    <h1>🛠️ public-apps</h1>
    <p>AIで作る、みんなに役立つ小さなアプリ集。</p>
    <a class="app" href="./meal-planner/">
      <span class="name">🍽️ 週間献立プランナー</span><br />
      <span class="desc">家族の条件を選ぶだけで、1週間分の献立と買い物リストを自動作成。登録不要・無料。</span>
    </a>
    <a class="app" href="./pantry-tracker/">
      <span class="name">🧺 在庫管理</span><br />
      <span class="desc">家にある食材・日用品を消費期限と残量で管理。期限切れ・買い足しが一目で分かる。登録不要・無料。</span>
    </a>
    <a class="app" href="./flashcards/">
      <span class="name">🧠 暗記カード</span><br />
      <span class="desc">テキストを貼ればAIが一問一答のカードを自動生成。SM-2間隔反復で効率よく暗記。登録・インストール不要・無料。</span>
    </a>
    <footer>
      <a href="https://github.com/hiiirano/public-apps">GitHub リポジトリ</a>
    </footer>
  </body>
</html>
